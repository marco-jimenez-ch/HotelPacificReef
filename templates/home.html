<!-- BLOQUE CLIMA — API Externa Open-Meteo -->
<section class="py-3 bg-light border-bottom">
  <div class="container">
    <div class="row align-items-center justify-content-center">
      <div class="col-auto">
        <small class="text-muted me-2">
          <i class="bi bi-geo-alt-fill text-danger"></i>
          Viña del Mar, Chile
        </small>
      </div>

      {% if clima.disponible %}
      <div class="col-auto d-flex align-items-center gap-3">
        <span class="fs-4">{{ clima.icono }}</span>
        <div>
          <strong class="fs-5">{{ clima.temperatura }}°C</strong>
          <span class="text-muted ms-2">{{ clima.descripcion }}</span>
        </div>
        <div class="text-muted small">
          <i class="bi bi-wind"></i> {{ clima.velocidad_viento }} km/h
        </div>
      </div>
      {% else %}
      <div class="col-auto">
        <small class="text-muted">🌡️ Clima no disponible</small>
      </div>
      {% endif %}

      <div class="col-auto">
        <small class="text-muted ms-3">
          <i class="bi bi-info-circle"></i>
          Clima en tiempo real vía
          <a href="https://open-meteo.com" target="_blank"
             class="text-decoration-none text-muted">Open-Meteo API</a>
        </small>
      </div>
    </div>
  </div>
</section>
<!-- FIN BLOQUE CLIMA -->
