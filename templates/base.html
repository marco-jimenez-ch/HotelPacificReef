<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hotel Pacific Reef{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/custom.css' %}" rel="stylesheet">
</head>
<body>
  {% include 'navbar.html' %}

  {% if messages %}
    <div class="container mt-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          <i class="bi
            {% if message.tags == 'success' %}bi-check-circle-fill
            {% elif message.tags == 'error' or message.tags == 'danger' %}bi-x-circle-fill
            {% elif message.tags == 'warning' %}bi-exclamation-triangle-fill
            {% else %}bi-info-circle-fill{% endif %}
            me-2"></i>
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}

  {% block fullwidth %}{% endblock %}

  <main class="{% block main_class %}container py-5{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  {% include 'footer.html' %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% load static %}
  <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
