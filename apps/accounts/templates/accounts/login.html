{% extends 'base.html' %}
{% block title %}Iniciar Sesión — Hotel Pacific Reef{% endblock %}

{% block content %}
<div class="row justify-content-center py-3">
  <div class="col-md-5 col-lg-4">
    <div class="card-form">
      <div class="card-form-header text-center" style="background: linear-gradient(135deg, #023E8A, #0077B6);">
        <div class="mb-3">
          <span class="rounded-circle bg-white d-inline-flex align-items-center justify-content-center"
                style="width:56px;height:56px;">
            <i class="bi bi-water text-primary" style="font-size:1.6rem;"></i>
          </span>
        </div>
        <h4 class="fw-bold text-white mb-1" style="font-family:'Playfair Display',serif;">Bienvenido</h4>
        <p class="text-white-50 small mb-0">Inicia sesión en tu cuenta</p>
      </div>
      <div class="p-4 bg-white">
        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" id="email" class="form-control"
                     placeholder="correo@ejemplo.com" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="password" class="form-control"
                     placeholder="Tu contraseña" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
          </button>
        </form>
        <hr class="my-4">
        <p class="text-center text-muted small mb-0">
          ¿No tienes cuenta?
          <a href="{% url 'registro' %}" class="text-decoration-none fw-semibold text-primary">Regístrate aquí</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
